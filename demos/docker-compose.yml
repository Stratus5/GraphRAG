services:
  demo:
    build:
      context: ..
      dockerfile: demos/Dockerfile
    container_name: graphrag-demo
    env_file:
      - ../.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - WEAVIATE_GRPC_PORT=50051
    ports:
      - "127.0.0.1:8800:8800"
    networks:
      - graphrag-net

networks:
  graphrag-net:
    name: graphrag-net
    external: true
