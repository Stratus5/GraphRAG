services:
  neo4j:
    image: neo4j:5.23
    container_name: graphrag-neo4j
    ports:
      - "127.0.0.1:7474:7474"   # browser
      - "127.0.0.1:7687:7687"   # bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - graphrag-net

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.1
    container_name: graphrag-weaviate
    ports:
      - "127.0.0.1:8080:8080"     # HTTP
      - "127.0.0.1:50051:50051"   # gRPC
    environment:
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_MODULES=
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - graphrag-net

volumes:
  neo4j_data:
  weaviate_data:

networks:
  graphrag-net:
    name: graphrag-net
